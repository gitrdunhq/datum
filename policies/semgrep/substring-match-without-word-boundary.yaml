rules:
  - id: substring-match-without-word-boundary
    patterns:
      - pattern: |
          if "..." in $VAR: ...
      - metavariable-regex:
          metavariable: $...LITERAL
          regex: ^.{1,4}$
    message: >
      Short string literal used in substring match. The expression
      `if "x" in y` matches anywhere in the string, which causes false
      positives. For short strings (1-4 chars), use equality checks,
      startswith/endswith, or regex word boundaries instead.
    languages: [python]
    severity: WARNING
    metadata:
      kirby_id: KIRBY-QUA-002
      category: code-quality
      subcategory: correctness
      property-domain: determinism
      caliper-plugin: semgrep
      compliance_mappings: []
      references:
        - https://github.com/gitrdunhq/caliper-community-rules
