rules:
  - id: long-parameter-list-java
    pattern: $RET $F($T1 $A, $T2 $B, $T3 $C, $T4 $D, $T5 $E, $T6 $G, ...) { ... }
    message: >
      Method has six or more parameters, a long-parameter-list bloat smell.
      Long parameter lists are hard to read, easy to call in the wrong order,
      and signal the method is doing too much. Introduce a parameter object or
      builder, or split the method into smaller focused units.
    languages: [java]
    severity: INFO
    metadata:
      kirby_id: KIRBY-QUA-009
      category: code-quality
      subcategory: bloater
      property-domain: boundedness
      eedom-plugin: semgrep
      compliance_mappings: []
      references:
        - https://refactoring.guru/smells/long-parameter-list
        - https://luzkan.github.io/smells/long-parameter-list
