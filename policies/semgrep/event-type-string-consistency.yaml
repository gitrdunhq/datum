rules:
  - id: event-type-string-consistency
    patterns:
      - pattern: |
          event_type = "..."
      - pattern-not: |
          event_type = $ENUM.$ATTR
    message: >
      Hardcoded event_type string detected. Use an enum or constant instead
      of a raw string literal to ensure consistency across the codebase.
      Typos in event type strings cause silent routing failures that are
      extremely difficult to debug.
    languages: [python]
    severity: WARNING
    metadata:
      kirby_id: KIRBY-STD-001
      category: standards
      subcategory: naming-consistency
      property-domain: determinism
      caliper-plugin: semgrep
      compliance_mappings: []
      references:
        - https://github.com/sam-fakhreddine/caliper-community-rules
