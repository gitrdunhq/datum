rules:
  - id: hardcoded-credentials
    patterns:
      - pattern-either:
          # Pattern 1: Variable/attribute name contains credential term, value is non-trivial
          - patterns:
              - pattern: $CREDVAR = "$VALUE"
              - metavariable-regex:
                  metavariable: $CREDVAR
                  regex: '(?i)(password|passwd|secret|api_key|apikey|api_secret|token|auth_token|access_token|private_key|credentials)$'
              - metavariable-regex:
                  metavariable: $VALUE
                  regex: '^(?i)(?!.*(changeme|placeholder|xxx+|example|your_|replace_me|dummy|fake|sample|none|null|empty|todo|fixme)).{8,}$'
          # Pattern 2: AWS access key ID (AKIA prefix + 16 uppercase alphanumeric chars)
          - patterns:
              - pattern: $VAR = "$AWSKEY"
              - metavariable-regex:
                  metavariable: $AWSKEY
                  regex: '^AKIA[0-9A-Z]{16}$'
          # Pattern 3: Database/service connection string with embedded non-placeholder password
          - patterns:
              - pattern: $VAR = "$CONNSTR"
              - metavariable-regex:
                  metavariable: $CONNSTR
                  regex: '^(postgresql|postgres|mysql|mongodb|redis|mssql|amqp)://[^:/@\s]+:[^@/\s]{4,}@'
              - metavariable-regex:
                  metavariable: $CONNSTR
                  regex: '^(?i)(?!.*://[^:@/]*:(password|changeme|test|example|placeholder|dummy|xxx+|secret)@)'
          # Pattern 4: os.environ.get() with a hardcoded fallback that looks like a real credential
          - patterns:
              - pattern: os.environ.get($ENVKEY, "$FALLBACK")
              - metavariable-regex:
                  metavariable: $ENVKEY
                  regex: '(?i)(password|passwd|secret|api_key|apikey|token|auth|credential)'
              - metavariable-regex:
                  metavariable: $FALLBACK
                  regex: '^(?i)(?!.*(changeme|placeholder|xxx+|example|your_|replace_me|dummy|fake|sample|none|null|empty|todo|fixme)).{16,}$'
          # Pattern 5: Dict literal with a credential string key and non-trivial string value
          - patterns:
              - pattern: |
                  {$DICTKEY: "$DICTVAL", ...}
              - metavariable-regex:
                  metavariable: $DICTKEY
                  regex: '(?i)(password|passwd|secret|api_key|apikey|token|auth)'
              - metavariable-regex:
                  metavariable: $DICTVAL
                  regex: '^(?i)(?!.*(changeme|placeholder|xxx+|example|your_|replace_me|dummy|fake|sample|none|null|empty|todo|fixme)).{8,}$'
    message: >
      Hardcoded credential detected. Embedding passwords, API keys, tokens, or
      connection-string secrets directly in source code exposes them to every
      developer, CI log, and anyone with repository or binary access. Store
      secrets in environment variables, a secrets manager (e.g., AWS Secrets
      Manager, HashiCorp Vault), or a dedicated secrets injection system that
      keeps credentials out of version control. Rotate any credential that has
      already been committed.
    languages: [python]
    severity: ERROR
    metadata:
      kirby_id: KIRBY-SEC-005
      category: security
      subcategory: hardcoded-credentials
      property-domain: confidentiality
      caliper-plugin: semgrep
      compliance_mappings:
        - framework: owasp-top10-2021
          controls: ["A07:2021"]
        - framework: owasp-asvs-v4.0
          controls: ["V2.10.4"]
        - framework: nist-800-53-r5
          controls: ["IA-5(7)", "CM-6"]
        - framework: cis-aws-v2.0
          controls: ["1.14"]
        - framework: soc2-tsc
          controls: ["CC6.1"]
        - framework: pci-dss-v4.0
          controls: ["2.2.2", "8.3.2"]
        - framework: hipaa-security
          controls: ["164.312(a)(2)(iv)"]
        - framework: iso-27001-2022
          controls: ["A.5.33"]
      references:
        - https://github.com/gitrdunhq/caliper-community-rules
