rules:
  - id: long-parameter-list-js
    pattern: function $F($A, $B, $C, $D, $E, $G, ...) { ... }
    message: >
      Function has six or more parameters, a long-parameter-list bloat smell.
      Long parameter lists are hard to read, easy to call in the wrong order,
      and signal the function is doing too much. Introduce an options object,
      a typed config parameter, or split the function into smaller focused units.
    languages: [javascript, typescript]
    severity: INFO
    metadata:
      kirby_id: KIRBY-QUA-009
      category: code-quality
      subcategory: bloater
      property-domain: boundedness
      caliper-plugin: semgrep
      compliance_mappings: []
      references:
        - https://refactoring.guru/smells/long-parameter-list
        - https://luzkan.github.io/smells/long-parameter-list
