rules:
  - id: sql-injection
    patterns:
      - pattern-either:
          # f-string passed directly to execute (cursor, engine, or any DB connection object)
          - pattern: $CURSOR.execute(f"...")
          - pattern: $CURSOR.execute(f'...')
          # String concatenation passed to execute (string literal on either side)
          - pattern: $CURSOR.execute("..." + $VAR)
          - pattern: $CURSOR.execute($VAR + "...")
          # Python % string formatting used to build the query — NOT the same as SQL %s parameterization
          - pattern: $CURSOR.execute("..." % $ARGS)
          # SQLAlchemy text() wrapper with f-string — interpolation happens before DB sees the query
          - pattern: $CONN.execute(text(f"..."))
          - pattern: $CONN.execute(text(f'...'))
    message: >
      SQL injection vulnerability detected. User-controlled input is interpolated
      directly into a SQL query string via f-string formatting, string
      concatenation, or Python % formatting before being passed to execute().
      An attacker can craft input to alter the SQL query structure, bypass
      authentication, exfiltrate data, or destroy records. Use parameterized
      queries: pass a query string with %s or ? placeholders as the first
      argument and a tuple of values as the second argument (e.g.,
      cursor.execute("SELECT * FROM users WHERE id = %s", (user_id,))). For
      SQLAlchemy, use bound parameters with text() and :param syntax, or use
      the ORM query interface.
    languages: [python]
    severity: ERROR
    metadata:
      kirby_id: KIRBY-SEC-008
      category: security
      subcategory: sql-injection
      property-domain: integrity
      caliper-plugin: semgrep
      compliance_mappings:
        - framework: owasp-top10-2021
          controls: ["A03:2021"]
        - framework: owasp-asvs-v4.0
          controls: ["V5.3.4"]
        - framework: nist-800-53-r5
          controls: ["SI-10"]
        - framework: pci-dss-v4.0
          controls: ["6.2.4"]
        - framework: hipaa-security
          controls: ["164.312(a)(1)"]
        - framework: iso-27001-2022
          controls: ["A.8.26"]
      references:
        - https://github.com/gitrdunhq/caliper-community-rules
