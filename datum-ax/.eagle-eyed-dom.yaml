# Eagle Eyed Dom — repo config for datum-ax.
# Schema: eedom src/eedom/core/repo_config.py (plugins.enabled/disabled,
# plugins.semgrep.*, thresholds.<plugin>.*). There is no per-path/per-check
# suppression today, so noise from a whole plugin is muted at the plugin level.

plugins:
  disabled:
    # blast-radius flags our contracts/ ports (runtime_checkable Protocols, ADR-0032)
    # as mock_stub_in_source / noop_function / orphan_symbol because their method
    # bodies are intentionally `...`. That is by-design for a ports-and-adapters
    # layer, and eedom has no path-level exclusion, so the whole plugin is the only
    # knob (eedom's own .eagle-eyed-dom.yaml disables it for the same reason).
    # Re-enable once eedom learns to skip typing.Protocol bodies — tracked for the
    # eedom side; until then the real fan-out/orphan signal here is minor.
    - blast-radius
    # NOTE: mypy is intentionally NOT disabled. Its only noise in host runs is
    # reportMissingImports from running through eedom's venv (no datum-ax deps);
    # in the container run mypy sees real deps and produces genuine signal.

thresholds:
  blast-radius:
    # Kept for when blast-radius is re-enabled: our composition root / synthesis
    # nodes legitimately fan out to ~10 collaborators (DI wiring), above the
    # default of 8. Raise the bar so only true outliers flag.
    fan_out_limit: 12
