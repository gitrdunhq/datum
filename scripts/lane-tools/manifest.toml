# Lane-tools manifest — declares permissions and timeouts for each tool.
# The lane-tools-runner enforces these at runtime.
# Pre-commit hook rejects new scripts without a corresponding entry here.

# Template for new entries:
#
# [tools.tool_name]
# path = "tool_name.py"
# description = "One-line description visible to agents via README.md"
# permissions = { network = false, write = [], read = ["src/", "tests/"] }
# timeout_seconds = 30
# added_in_epic = 1
# added_in_lane = "task-NNN"

[tools.find_callers]
path = "find_callers.py"
description = "Find likely call/reference sites for a symbol without loading whole files."
permissions = { network = false, write = [], read = ["."] }
timeout_seconds = 30
added_in_epic = 1
added_in_lane = "bootstrap"

[tools.filter_gitnexus_output]
path = "filter_gitnexus_output.py"
description = "Reduce GitNexus output to compact file, line, confidence records."
permissions = { network = false, write = [], read = [] }
timeout_seconds = 10
added_in_epic = 1
added_in_lane = "bootstrap"

[tools.read_file]
path = "read_file.py"
description = "Read the contents of a file."
permissions = { network = false, write = [], read = ["."] }
timeout_seconds = 10
added_in_epic = 1
added_in_lane = "aci-loop"

[tools.read_file_range]
path = "read_file_range.py"
description = "Read specific lines from a file."
permissions = { network = false, write = [], read = ["."] }
timeout_seconds = 10
added_in_epic = 1
added_in_lane = "aci-loop"

[tools.list_dir]
path = "list_dir.py"
description = "List contents of a directory."
permissions = { network = false, write = [], read = ["."] }
timeout_seconds = 10
added_in_epic = 1
added_in_lane = "aci-loop"

[tools.grep_search]
path = "grep_search.py"
description = "Search for a pattern in files."
permissions = { network = false, write = [], read = ["."] }
timeout_seconds = 30
added_in_epic = 1
added_in_lane = "aci-loop"

[tools.run_command]
path = "run_command.py"
description = "Execute a shell command."
permissions = { network = true, write = ["."], read = ["."] }
timeout_seconds = 60
added_in_epic = 1
added_in_lane = "aci-loop"

[tools.write_to_file]
path = "write_to_file.py"
description = "Write content to a file, creating parent directories as needed."
permissions = { network = false, write = ["."], read = ["."] }
timeout_seconds = 10
added_in_epic = 26
added_in_lane = "task-001"

[tools.replace_file_content]
path = "replace_file_content.py"
description = "Replace the first occurrence of old_text with new_text in a file."
permissions = { network = false, write = ["."], read = ["."] }
timeout_seconds = 10
added_in_epic = 26
added_in_lane = "task-001"

[tools.multi_replace_file_content]
path = "multi_replace_file_content.py"
description = "Apply a list of old_text/new_text replacements sequentially to a file."
permissions = { network = false, write = ["."], read = ["."] }
timeout_seconds = 10
added_in_epic = 26
added_in_lane = "task-001"
