# Pre-commit gates for datum-ax: ruff format-check, ruff lint, mypy --strict. Scoped to datum-ax/ so
# commits elsewhere in the parent repo are unaffected. repo:local sources the tool versions from
# datum-ax's dev group (single source of truth), not a duplicated pinned rev.
# Install (once):  cd datum-ax && uv run pre-commit install     (or: bash datum-ax/scripts/install-hooks.sh)
# Run manually:    cd datum-ax && uv run pre-commit run --all-files
# MIGRATION NOTE: when datum-ax becomes its own repo, move this file to its root and drop the
# `cd datum-ax &&` prefixes + the datum-ax/ path scoping.
repos:
  - repo: local
    hooks:
      - id: datum-ax-ruff-format
        name: datum-ax ruff format (check)
        entry: bash -c 'cd datum-ax && uv run ruff format --check src tests'
        language: system
        files: ^datum-ax/.*\.py$
        pass_filenames: false
      - id: datum-ax-ruff-check
        name: datum-ax ruff lint
        entry: bash -c 'cd datum-ax && uv run ruff check src tests'
        language: system
        files: ^datum-ax/.*\.py$
        pass_filenames: false
      - id: datum-ax-mypy
        name: datum-ax mypy (strict)
        entry: bash -c 'cd datum-ax && uv run mypy'
        language: system
        files: ^datum-ax/.*\.py$
        pass_filenames: false
